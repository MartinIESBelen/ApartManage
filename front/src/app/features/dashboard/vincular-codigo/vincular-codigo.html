<div class="min-h-[80vh] flex items-center justify-center bg-habitalis-cream px-4 font-sans">
  <div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-habitalis-navy/10 p-8">

    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-habitalis-navy/5 text-habitalis-navy rounded-full flex items-center justify-center text-3xl mx-auto mb-4 shadow-sm">
        🔑
      </div>
      <h1 class="text-2xl font-serif font-bold text-habitalis-navy mb-2">Vincular Vivienda</h1>
      <p class="text-habitalis-navy/60 text-sm">Introduce el código secreto que te ha proporcionado tu casero para acceder a tu contrato.</p>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-xs font-bold text-habitalis-navy/50 uppercase tracking-widest mb-2">Código de Vinculación</label>
        <input type="text" [(ngModel)]="codigo" placeholder="Ej: APT-A1B2C"
               class="w-full text-center text-2xl tracking-widest uppercase font-mono bg-habitalis-cream/20 border-habitalis-navy/10 rounded-lg shadow-sm focus:ring-1 focus:ring-habitalis-navy focus:border-habitalis-navy p-4 border transition-all text-habitalis-navy outline-none"
               [disabled]="cargando || mensajeExito !== ''">
      </div>

      @if (mensajeError) {
        <div class="bg-habitalis-gold/10 text-habitalis-gold p-3 rounded-lg text-sm font-bold border border-habitalis-gold/20">
          ⚠️ {{ mensajeError }}
        </div>
      }

      @if (mensajeExito) {
        <div class="bg-habitalis-olive/10 text-habitalis-olive p-3 rounded-lg text-sm font-bold border border-habitalis-olive/20">
          ✓ {{ mensajeExito }} Redirigiendo...
        </div>
      }

      <button (click)="vincular()"
              [disabled]="cargando || !codigo || mensajeExito !== ''"
              class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-white bg-habitalis-olive hover:bg-habitalis-olive/90 font-bold focus:outline-none transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
        {{ cargando ? 'Verificando...' : 'Vincular Ahora' }}
      </button>

      <div class="text-center mt-4">
        <a routerLink="/home" class="text-sm font-semibold text-habitalis-navy/50 hover:text-habitalis-navy transition-colors">
          Cancelar y volver
        </a>
      </div>
    </div>

  </div>
</div>
