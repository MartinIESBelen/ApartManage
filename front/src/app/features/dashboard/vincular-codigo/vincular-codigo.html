<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">

    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
        🔑
      </div>
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Vincular Vivienda</h1>
      <p class="text-gray-500">Introduce el código secreto que te ha proporcionado tu casero para acceder a tu contrato.</p>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Código de Vinculación</label>
        <input type="text" [(ngModel)]="codigo" placeholder="Ej: APT-A1B2C"
               class="w-full text-center text-2xl tracking-widest uppercase font-mono border-gray-300 rounded-lg shadow-sm focus:ring-green-500 focus:border-green-500 p-4 border"
               [disabled]="cargando || mensajeExito !== ''">
      </div>

      @if (mensajeError) {
        <div class="bg-red-50 text-red-700 p-3 rounded-md text-sm border border-red-200">
          ❌ {{ mensajeError }}
        </div>
      }
      @if (mensajeExito) {
        <div class="bg-green-50 text-green-700 p-3 rounded-md text-sm font-medium border border-green-200">
          ✅ {{ mensajeExito }} Redirigiendo...
        </div>
      }

      <button (click)="vincular()"
              [disabled]="cargando || !codigo || mensajeExito !== ''"
              class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-white bg-green-600 hover:bg-green-700 font-bold focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
        {{ cargando ? 'Verificando...' : 'Vincular Ahora' }}
      </button>

      <div class="text-center mt-4">
        <a routerLink="/home" class="text-sm text-gray-500 hover:text-gray-800">Cancelar y volver</a>
      </div>
    </div>

  </div>
</div>
