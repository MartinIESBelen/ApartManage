<div class="min-h-screen bg-habitalis-cream p-4 sm:p-8 font-sans">
  <div class="max-w-7xl mx-auto">

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-serif font-bold text-habitalis-navy">Resumen Financiero</h1>
        <p class="text-habitalis-navy/60 mt-1">Controla la rentabilidad de tus activos inmobiliarios</p>
      </div>
      <button class="bg-white border border-habitalis-navy/20 text-habitalis-navy hover:bg-habitalis-cream font-semibold py-2 px-4 rounded-lg shadow-sm flex items-center gap-2 transition-colors text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Descargar Informe (CSV)
      </button>
    </div>

    <div class="bg-white p-5 rounded-xl shadow-sm border border-habitalis-navy/10 mb-8 flex flex-col md:flex-row gap-4 items-end">

      <div class="flex-1 w-full">
        <label class="block text-xs font-bold text-habitalis-navy/50 uppercase tracking-widest mb-1.5">Propiedad</label>
        <select [(ngModel)]="filtroPiso" (change)="cargarDatosFinancieros()"
                class="w-full bg-habitalis-cream/30 border border-habitalis-navy/10 text-habitalis-navy rounded-lg focus:ring-habitalis-navy focus:border-habitalis-navy block p-2.5 font-medium outline-none transition-all">
          <option value="TODOS"> Todos mis pisos (Consolidado)</option>
          @for (apto of misPropiedades(); track apto.id) {
            <option [value]="apto.id">{{ apto.nombreInterno }} ({{ apto.ciudad }})</option>
          }
        </select>
      </div>

      <div class="flex-1 w-full md:w-64">
        <label class="block text-xs font-bold text-habitalis-navy/50 uppercase tracking-widest mb-1.5">Periodo</label>
        <select [(ngModel)]="filtroPeriodo" (change)="cargarDatosFinancieros()"
                class="w-full bg-habitalis-cream/30 border border-habitalis-navy/10 text-habitalis-navy rounded-lg focus:ring-habitalis-navy focus:border-habitalis-navy block p-2.5 font-medium outline-none transition-all">
          <option value="MES">Últimos 30 días</option>
          <option value="TRIMESTRE">Este trimestre</option>
          <option value="ANIO_ACTUAL">Este año (YTD)</option>
          <option value="SIEMPRE">Histórico completo</option>
        </select>
      </div>

    </div>

    @if (cargando()) {
      <div class="flex justify-center items-center py-24">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-habitalis-navy"></div>
      </div>
    } @else {

      <div class="mb-8">
        <app-kpi [ingresos]="ingresosTotales()" [gastos]="gastosTotales()" />
      </div>

      <div class="mb-8">
        @if (mostrandoFormulario()) {
          <app-formulario-transaccion
            [transaccionAEditar]="transaccionAEditar()"
            [apartamento]="{ id: transaccionAEditar()?.apartamentoId, nombreInterno: transaccionAEditar()?.apartamentoNombre }"
            (volver)="cerrarEdicion()"
            (guardadoExitoso)="recargarDespuesDeEditar()" />
        } @else {
          <app-tabla-transacciones
            [transacciones]="ultimasTransacciones()"
            (editar)="abrirEdicion($event)"
            (recargar)="cargarDatosFinancieros()" />
        }
      </div>

      <div class="mb-8">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-habitalis-navy/10 h-96">
          <app-graficos-balance [datos]="datosGrafico()" />
        </div>
      </div>

    }
  </div>
</div>
