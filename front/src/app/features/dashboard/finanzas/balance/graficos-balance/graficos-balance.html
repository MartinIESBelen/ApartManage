<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-full flex flex-col">
  <h3 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
    📊 Evolución Mensual
  </h3>

  <div class="flex-1 flex items-end justify-between gap-1 sm:gap-4 h-64 mt-auto border-b-2 border-gray-100 pb-1">

    @for (item of datos(); track item.mes) {
      <div class="flex flex-col justify-end items-center flex-1 h-full group relative cursor-pointer">

        <div class="absolute -top-12 opacity-0 group-hover:opacity-100 transition-opacity bg-gray-800 text-white text-xs rounded-lg py-1.5 px-3 whitespace-nowrap z-10 pointer-events-none shadow-lg">
          <p class="font-bold text-green-400">+{{ item.ingresos | currency:'EUR':'symbol':'1.0-0' }}</p>
          <p class="font-bold text-red-400">-{{ item.gastos | currency:'EUR':'symbol':'1.0-0' }}</p>
        </div>

        <div class="flex items-end gap-0.5 sm:gap-1 w-full justify-center h-full">
          <div class="w-1/2 max-w-[24px] bg-green-500 rounded-t-sm transition-all duration-700 ease-out group-hover:bg-green-400"
               [style.height]="calcularAltura(item.ingresos)">
          </div>
          <div class="w-1/2 max-w-[24px] bg-red-400 rounded-t-sm transition-all duration-700 ease-out group-hover:bg-red-300"
               [style.height]="calcularAltura(item.gastos)">
          </div>
        </div>

        <span class="text-[10px] sm:text-xs text-gray-500 mt-3 font-bold uppercase tracking-wider truncate">
          {{ item.mes }}
        </span>
      </div>
    } @empty {
      <div class="w-full flex items-center justify-center h-full text-gray-400 text-sm font-medium">
        No hay datos registrados en este periodo.
      </div>
    }
  </div>

  <div class="flex justify-center gap-6 mt-6 pt-4 border-t border-gray-50">
    <div class="flex items-center gap-2">
      <span class="w-3 h-3 rounded-full bg-green-500 shadow-sm"></span>
      <span class="text-sm font-medium text-gray-600">Ingresos</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="w-3 h-3 rounded-full bg-red-400 shadow-sm"></span>
      <span class="text-sm font-medium text-gray-600">Gastos</span>
    </div>
  </div>
</div>
