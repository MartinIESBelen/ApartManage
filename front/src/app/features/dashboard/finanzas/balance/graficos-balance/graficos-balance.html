<div class="bg-white p-6 rounded-xl shadow-sm border border-habitalis-navy/10 h-full flex flex-col font-sans">

  <div class="flex items-center justify-center gap-2 sm:gap-3 mb-8 border-b border-habitalis-navy/5 pb-4">
    <img src="/iconos/pilar-antiguo.png" alt="Pilar izquierdo" class="h-10 sm:h-12 w-auto opacity-50">

    <h3 class="text-xl sm:text-2xl font-serif font-bold text-habitalis-navy text-center">
      Evolución Mensual
    </h3>

    <img src="/iconos/pilar-antiguo.png" alt="Pilar derecho" class="h-10 sm:h-12 w-auto opacity-50">
  </div>

  <div class="flex-1 flex items-end justify-between gap-1 sm:gap-4 h-64 mt-auto border-b border-habitalis-navy/10 pb-1">

    @for (item of datos(); track item.mes) {
      <div class="flex flex-col justify-end items-center flex-1 h-full group relative cursor-pointer">

        <div class="absolute -top-16 opacity-0 group-hover:opacity-100 transition-opacity bg-habitalis-navy text-habitalis-cream text-xs rounded-lg py-2 px-3 whitespace-nowrap z-10 pointer-events-none shadow-md border border-habitalis-navy/20">
          <p class="font-bold text-habitalis-olive">Ingresos: +{{ item.ingresos | currency:'EUR':'symbol':'1.0-0' }}</p>
          <p class="font-bold text-habitalis-gold">Gastos: -{{ item.gastos | currency:'EUR':'symbol':'1.0-0' }}</p>
        </div>

        <div class="flex items-end gap-0.5 sm:gap-1 w-full justify-center h-full">
          <div class="w-1/2 max-w-[20px] bg-habitalis-olive rounded-t-sm transition-all duration-700 ease-out group-hover:opacity-80"
               [style.height]="calcularAltura(item.ingresos)">
          </div>
          <div class="w-1/2 max-w-[20px] bg-habitalis-gold rounded-t-sm transition-all duration-700 ease-out group-hover:opacity-80"
               [style.height]="calcularAltura(item.gastos)">
          </div>
        </div>

        <span class="text-[10px] sm:text-xs text-habitalis-navy/50 mt-4 font-bold uppercase tracking-widest truncate">
          {{ item.mes }}
        </span>
      </div>
    } @empty {
      <div class="w-full flex items-center justify-center h-full text-habitalis-navy/30 text-sm font-medium italic">
        No hay datos registrados en este periodo.
      </div>
    }
  </div>

  <div class="flex justify-center gap-8 mt-8 pt-6 border-t border-habitalis-navy/5">
    <div class="flex items-center gap-2.5">
      <span class="w-3 h-3 rounded-full bg-habitalis-olive shadow-sm"></span>
      <span class="text-xs font-bold text-habitalis-navy/60 uppercase tracking-tighter">Ingresos</span>
    </div>
    <div class="flex items-center gap-2.5">
      <span class="w-3 h-3 rounded-full bg-habitalis-gold shadow-sm"></span>
      <span class="text-xs font-bold text-habitalis-navy/60 uppercase tracking-tighter">Gastos</span>
    </div>
  </div>
</div>
