<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

  <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
    <div class="flex items-center justify-between mb-4">
      <div class="p-3 bg-green-50 text-green-600 rounded-xl text-2xl">💰</div>
      <span class="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded-full">+12% vs mes ant.</span>
    </div>
    <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Ingresos Brutos</p>
    <h3 class="text-3xl font-extrabold text-gray-900">{{ ingresos() | currency:'EUR' }}</h3>
  </div>

  <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
    <div class="flex items-center justify-between mb-4">
      <div class="p-3 bg-red-50 text-red-600 rounded-xl text-2xl">📉</div>
      <span class="text-xs font-bold text-gray-400">Suministros + Mantenimiento</span>
    </div>
    <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Gastos Totales</p>
    <h3 class="text-3xl font-extrabold text-gray-900">{{ gastos() | currency:'EUR' }}</h3>
  </div>

  <div class="bg-white p-6 rounded-2xl shadow-sm border-2"
       [class.border-blue-100]="esPositivo()"
       [class.border-red-100]="!esPositivo()">
    <div class="flex items-center justify-between mb-4">
      <div class="p-3 rounded-xl text-2xl"
           [class.bg-blue-50]="esPositivo()" [class.text-blue-600]="esPositivo()"
           [class.bg-red-50]="!esPositivo()" [class.text-red-600]="!esPositivo()">
        {{ esPositivo() ? '🏦' : '⚠️' }}
      </div>
      <span class="text-xs font-bold px-2 py-1 rounded-full"
            [class.bg-blue-50]="esPositivo()" [class.text-blue-600]="esPositivo()"
            [class.bg-red-50]="!esPositivo()" [class.text-red-600]="!esPositivo()">
        {{ margenBeneficio() | number:'1.0-1' }}% Margen
      </span>
    </div>
    <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Beneficio Neto</p>
    <h3 class="text-3xl font-extrabold" [class.text-blue-700]="esPositivo()" [class.text-red-700]="!esPositivo()">
      {{ beneficioNeto() | currency:'EUR' }}
    </h3>
  </div>

</div>
