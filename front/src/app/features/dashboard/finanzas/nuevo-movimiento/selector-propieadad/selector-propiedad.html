<div class="mb-8 font-sans">
  <h1 class="text-3xl font-serif font-bold text-habitalis-navy">Nuevo Movimiento</h1>
  <p class="text-habitalis-navy/60 mt-1">Selecciona la propiedad a la que pertenece la transacción</p>
</div>

<div class="bg-white p-6 rounded-xl shadow-sm border border-habitalis-navy/10">
  <div class="mb-6 relative">
    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-habitalis-navy/30">🔍</span>
    <input type="text"
           [(ngModel)]="terminoBusqueda"
           placeholder="Buscar por nombre o ciudad..."
           class="w-full pl-10 pr-4 py-3 bg-habitalis-cream border border-habitalis-navy/10 rounded-lg focus:ring-1 focus:ring-habitalis-navy focus:border-habitalis-navy transition-all outline-none text-habitalis-navy text-sm">
  </div>

  <div class="space-y-3">
    @for (apto of apartamentosFiltrados(); track apto.id) {
      <div (click)="seleccionar(apto)"
           class="group flex items-center justify-between p-4 rounded-xl border border-habitalis-navy/10 hover:border-habitalis-olive hover:bg-habitalis-olive/5 cursor-pointer transition-all">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-habitalis-navy/5 text-habitalis-navy rounded-lg flex items-center justify-center text-xl shadow-sm group-hover:bg-habitalis-navy group-hover:text-white transition-colors">
            🏢
          </div>
          <div>
            <h3 class="font-bold text-habitalis-navy">{{ apto.nombreInterno }}</h3>
            <p class="text-sm text-habitalis-navy/50">{{ apto.ciudad }}

              <!--Comentamos porque no tenemos inquilino actual
              @if (apto.inquilinoActual) {
                <span class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-habitalis-gold/10 text-habitalis-gold border border-habitalis-gold/20">
                  Alquilado: {{ apto.inquilinoActual }}
                </span>
              }-->

            </p>
          </div>
        </div>
        <div class="text-habitalis-navy/30 group-hover:text-habitalis-olive font-bold text-sm transition-colors">
          Seleccionar &rarr;
        </div>
      </div>
    } @empty {
      <div class="text-center py-12 text-habitalis-navy/40 italic">
        No se encontraron propiedades con ese nombre.
      </div>
    }
  </div>
</div>
