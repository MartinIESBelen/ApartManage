<div class="min-h-screen bg-gray-50 p-8">
  <div class="max-w-2xl mx-auto">
    <button (click)="guardar()" class="text-gray-500 hover:text-gray-800 mb-6 flex items-center gap-2">
      ← Cancelar y volver
    </button>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
      <div class="bg-indigo-700 p-6 text-white text-center">
        <h1 class="text-2xl font-bold">Registro Manual de Alquiler</h1>
        <p class="text-indigo-200 text-sm">Crea un contrato y una cuenta para tu inquilino en un solo paso.</p>
      </div>

      <div class="p-8 space-y-8">
        <section>
          <h3 class="text-indigo-900 font-bold uppercase text-xs tracking-widest mb-4 border-b pb-2">📅 Datos del Contrato</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Entrada</label>
              <input type="date" [(ngModel)]="form.fechaEntrada" class="w-full border-gray-300 rounded-lg p-2 border">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Salida</label>
              <input type="date" [(ngModel)]="form.fechaSalida" class="w-full border-gray-300 rounded-lg p-2 border">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Precio Mensual (€)</label>
              <input type="number" [(ngModel)]="form.precioBaseAlquiler" class="w-full border-gray-300 rounded-lg p-2 border" placeholder="850">
            </div>
          </div>
        </section>

        <section>
          <h3 class="text-indigo-900 font-bold uppercase text-xs tracking-widest mb-4 border-b pb-2">👤 Datos del Inquilino</h3>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
              <input type="text" [(ngModel)]="form.nombreInquilino" class="w-full border-gray-300 rounded-lg p-2 border" placeholder="Juan Pérez">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" [(ngModel)]="form.emailInquilino" class="w-full border-gray-300 rounded-lg p-2 border" placeholder="juan@email.com">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                <input type="tel" [(ngModel)]="form.telefonoInquilino" class="w-full border-gray-300 rounded-lg p-2 border" placeholder="+34 600 000 000">
              </div>
            </div>
          </div>
        </section>

        <button (click)="guardar()"
                [disabled]="cargando"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 disabled:opacity-50">
          {{ cargando ? 'Procesando registro...' : 'Finalizar y Crear Contrato' }}
        </button>
      </div>
    </div>
  </div>
</div>
