<div class="min-h-screen bg-[#F7F5F0] p-4 sm:p-8 font-sans">
  <div class="max-w-2xl mx-auto">

    <a [routerLink]="['/apartamento', apartamentoId, 'inventario', itemId]"
       class="text-[#1B263B]/70 hover:text-[#1B263B] mb-6 flex items-center gap-2 transition-colors w-fit font-medium">
      &larr; Cancelar y volver a la ficha
    </a>

    <div class="bg-white rounded-xl shadow-sm border border-[#1B263B]/10 overflow-hidden">

      <div class="bg-[#1B263B] p-6 text-white text-center">
        <h1 class="text-2xl font-serif font-bold">Editar Elemento</h1>
        <p class="text-white/80 text-sm mt-1">Actualiza la información de este mueble o electrodoméstico.</p>
      </div>

      @if (cargando()) {
        <div class="flex justify-center py-20">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#1B263B]"></div>
        </div>
      } @else {
        <form (ngSubmit)="guardar(itemForm)" #itemForm="ngForm" class="p-6 sm:p-8 space-y-6">

          <div>
            <label class="block text-sm font-bold text-[#1B263B] mb-1">Nombre del Elemento *</label>
            <input type="text" name="nombre" [(ngModel)]="form.nombre" required #nombre="ngModel"
                   class="w-full border-[#1B263B]/20 rounded-lg p-3 border focus:ring-1 focus:ring-[#1B263B] outline-none transition-all"
                   [class.border-[#8C7851]]="nombre.invalid && nombre.touched">
            @if (nombre.invalid && nombre.touched) {
              <div class="text-[#8C7851] text-xs mt-1 font-bold italic">El nombre es obligatorio.</div>
            }
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-bold text-[#1B263B] mb-1">Categoría *</label>
              <select name="categoria" [(ngModel)]="form.categoria" required #categoria="ngModel"
                      class="w-full border-[#1B263B]/20 rounded-lg p-3 border focus:ring-1 focus:ring-[#1B263B] outline-none bg-white transition-all"
                      [class.border-[#8C7851]]="categoria.invalid && categoria.touched">
                @for (cat of categorias; track cat) {
                  <option [value]="cat">{{ cat }}</option>
                }
              </select>
            </div>

            <div>
              <label class="block text-sm font-bold text-[#1B263B] mb-1">Estado Actual *</label>
              <select name="estado" [(ngModel)]="form.estado" required
                      class="w-full border-[#1B263B]/20 rounded-lg p-3 border focus:ring-1 focus:ring-[#1B263B] outline-none bg-white transition-all">
                @for (est of estados; track est) {
                  <option [value]="est">{{ est }}</option>
                }
              </select>
            </div>
          </div>

          <div class="border-t border-[#1B263B]/10 pt-6">
            <h3 class="text-xs font-bold text-[#1B263B]/50 uppercase tracking-widest mb-4">Información de Compra</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium text-[#1B263B]/70 mb-1">Fecha de Compra</label>
                <input type="date" name="fechaCompra" [(ngModel)]="form.fechaCompra"
                       class="w-full border-[#1B263B]/20 rounded-lg p-3 border focus:ring-1 focus:ring-[#1B263B] outline-none transition-all">
              </div>

              <div>
                <label class="block text-sm font-medium text-[#1B263B]/70 mb-1">Precio (€)</label>
                <input type="number" name="precio" [(ngModel)]="form.precioCompra" min="0" step="0.01"
                       class="w-full border-[#1B263B]/20 rounded-lg p-3 border focus:ring-1 focus:ring-[#1B263B] outline-none transition-all">
              </div>
            </div>
          </div>

          <button type="submit"
                  [disabled]="guardando || itemForm.invalid"
                  class="w-full bg-[#718355] hover:bg-[#718355]/90 text-white font-bold py-4 rounded-xl shadow-sm transition-all transform active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed mt-4">
            {{ guardando ? 'Guardando cambios...' : 'Guardar Cambios' }}
          </button>

        </form>
      }
    </div>
  </div>
</div>
