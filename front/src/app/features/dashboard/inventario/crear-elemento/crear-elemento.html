<div class="min-h-screen bg-habitalis-cream p-4 sm:p-8 font-sans">
  <div class="max-w-2xl mx-auto">

    <a [routerLink]="['/apartamento', apartamentoId, 'inventario']"
       class="text-habitalis-navy/70 hover:text-habitalis-navy mb-6 flex items-center gap-2 transition-colors w-fit font-medium">
      &larr; Cancelar y volver al inventario
    </a>

    <div class="bg-white rounded-xl shadow-sm border border-habitalis-navy/10 overflow-hidden">

      <div class="bg-habitalis-navy p-6 text-white text-center">
        <h1 class="text-2xl font-serif font-bold">Añadir al Inventario</h1>
        <p class="text-habitalis-cream/80 text-sm mt-1 font-sans">Registra un nuevo mueble o electrodoméstico.</p>
      </div>

      <form (ngSubmit)="guardar(itemForm)" #itemForm="ngForm" class="p-6 sm:p-8 space-y-6">

        <div>
          <label class="block text-sm font-bold text-habitalis-navy mb-1 font-sans">Nombre del Elemento *</label>
          <input type="text" name="nombre" [(ngModel)]="form.nombre" required #nombre="ngModel"
                 class="w-full border-habitalis-navy/20 rounded-lg p-3 border focus:ring-1 focus:ring-habitalis-navy outline-none transition-all font-sans"
                 placeholder="Ej. Sofá de 3 plazas, Frigorífico, Lámpara de pie..."
                 [class.border-habitalis-gold]="nombre.invalid && nombre.touched">
          @if (nombre.invalid && nombre.touched) {
            <div class="text-habitalis-gold text-xs mt-1 font-bold italic">El nombre es obligatorio.</div>
          }
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-bold text-habitalis-navy mb-1 font-sans">Categoría *</label>
            <select name="categoria" [(ngModel)]="form.categoria" required #categoria="ngModel"
                    class="w-full border-habitalis-navy/20 rounded-lg p-3 border focus:ring-1 focus:ring-habitalis-navy outline-none bg-white transition-all font-sans"
                    [class.border-habitalis-gold]="categoria.invalid && categoria.touched">
              <option value="" disabled selected>Selecciona una categoría</option>
              @for (cat of categorias; track cat) {
                <option [value]="cat">{{ cat }}</option>
              }
            </select>
          </div>

          <div>
            <label class="block text-sm font-bold text-habitalis-navy mb-1 font-sans">Estado Actual *</label>
            <select name="estado" [(ngModel)]="form.estado" required
                    class="w-full border-habitalis-navy/20 rounded-lg p-3 border focus:ring-1 focus:ring-habitalis-navy outline-none bg-white transition-all font-sans">
              @for (est of estados; track est) {
                <option [value]="est">{{ est }}</option>
              }
            </select>
          </div>
        </div>

        <div class="border-t border-habitalis-navy/10 pt-6">
          <h3 class="text-xs font-bold text-habitalis-navy/50 uppercase tracking-widest mb-4 font-sans">Información de Compra (Opcional)</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-habitalis-navy/70 mb-1 font-sans">Fecha de Compra</label>
              <input type="date" name="fechaCompra" [(ngModel)]="form.fechaCompra"
                     class="w-full border-habitalis-navy/20 rounded-lg p-3 border focus:ring-1 focus:ring-habitalis-navy outline-none transition-all font-sans">
            </div>

            <div>
              <label class="block text-sm font-medium text-habitalis-navy/70 mb-1 font-sans">Precio (€)</label>
              <input type="number" name="precio" [(ngModel)]="form.precioCompra" min="0" step="0.01"
                     class="w-full border-habitalis-navy/20 rounded-lg p-3 border focus:ring-1 focus:ring-habitalis-navy outline-none transition-all font-sans"
                     placeholder="0.00">
            </div>
          </div>
        </div>

        <button type="submit"
                [disabled]="cargando || itemForm.invalid"
                class="w-full bg-habitalis-olive hover:bg-habitalis-olive/90 text-white font-bold py-4 rounded-xl shadow-sm transition-all transform active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed mt-4 font-sans">
          {{ cargando ? 'Guardando elemento...' : 'Añadir al Inventario' }}
        </button>

      </form>
    </div>
  </div>
</div>
