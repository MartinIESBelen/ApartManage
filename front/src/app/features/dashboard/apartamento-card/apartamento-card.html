<article class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow duration-300">
  <div class="h-48 bg-blue-100 flex items-center justify-center text-blue-500">
    <span class="text-6xl">🏢</span>
  </div>

  <div class="p-5">
    <h2 class="text-xl font-bold text-gray-900 mb-2">{{ apartamento.nombreInterno }}</h2>
    <p class="text-gray-600 mb-3 flex items-center gap-2">
      📍 {{ apartamento.ciudad }}
    </p>
    <p class="text-sm text-gray-500 line-clamp-2 mb-4">
      {{ apartamento.descripcion }}
    </p>

    <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100">
      <span class="px-3 py-1 bg-green-100 text-green-800 text-xs font-semibold rounded-full">
        {{ apartamento.estado }}
      </span>
      <a [routerLink]="['/apartamento', apartamento.id]" class="text-blue-600 hover:text-blue-800 font-medium text-sm transition-colors">
        Ver Detalles →
      </a>
    </div>
  </div>
</article>
