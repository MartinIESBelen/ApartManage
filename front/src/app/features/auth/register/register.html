<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">

    <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">Crear una Cuenta</h2>

    @if (errorMessage) {
      <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-center text-sm">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

      <div class="mb-4">
        <label for="nombre" class="block text-sm font-bold text-gray-700 mb-2">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre" [(ngModel)]="userData.nombreCompleto" required
               class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
      </div>

      <div class="mb-4">
        <label for="email" class="block text-sm font-bold text-gray-700 mb-2">Correo Electrónico</label>
        <input type="email" id="email" name="email" [(ngModel)]="userData.email" required
               class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
      </div>

      <div class="mb-4">
        <label for="password" class="block text-sm font-bold text-gray-700 mb-2">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="userData.password" required
               class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
      </div>

      <div class="mb-6">
        <label for="rol" class="block text-sm font-bold text-gray-700 mb-2">¿Qué tipo de usuario eres?</label>
        <select id="rol" name="rol" [(ngModel)]="userData.rol" required
                class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 bg-white">
          <option value="INQUILINO">Soy un Inquilino (Busco piso o ya tengo uno)</option>
          <option value="PROPIETARIO">Soy un Propietario (Quiero gestionar mis pisos)</option>
        </select>
      </div>

      <button type="submit" [disabled]="registerForm.invalid"
              class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition duration-200">
        Registrarse
      </button>
    </form>

    <div class="mt-6 text-center text-sm">
      <p class="text-gray-600">¿Ya tienes cuenta?
        <a routerLink="/login" class="text-blue-500 font-bold hover:underline">Inicia sesión aquí</a>
      </p>
    </div>

  </div>
</div>
