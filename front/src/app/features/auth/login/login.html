<div class="min-h-screen flex items-center justify-center bg-habitalis-cream font-sans">
  <div class="bg-white p-8 md:p-10 rounded-xl shadow-sm border border-habitalis-navy/10 w-full max-w-md">

    <h2 class="text-4xl font-serif font-bold text-center text-habitalis-navy mb-8 tracking-tight">Habitalis</h2>

    @if (errorMessage) {
      <div class="bg-habitalis-gold/10 border border-habitalis-gold/30 text-habitalis-gold px-4 py-3 rounded-lg text-sm font-bold mb-6 flex items-center gap-2">
        <span>⚠️</span> {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">

      <div>
        <label class="block text-habitalis-navy/70 text-xs font-bold uppercase tracking-widest mb-2" for="email">
          Correo Electrónico
        </label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          class="w-full bg-habitalis-cream/30 border border-habitalis-navy/10 rounded-lg py-3 px-4 text-habitalis-navy leading-tight focus:outline-none focus:ring-1 focus:ring-habitalis-navy focus:border-habitalis-navy transition-all placeholder-habitalis-navy/20"
          placeholder="propietario@email.com"
        >
      </div>

      <div>
        <label class="block text-habitalis-navy/70 text-xs font-bold uppercase tracking-widest mb-2" for="password">
          Contraseña
        </label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="credentials.password"
          required
          class="w-full bg-habitalis-cream/30 border border-habitalis-navy/10 rounded-lg py-3 px-4 text-habitalis-navy leading-tight focus:outline-none focus:ring-1 focus:ring-habitalis-navy focus:border-habitalis-navy transition-all placeholder-habitalis-navy/20"
          placeholder="********"
        >
        <div class="text-right mt-3">
          <a routerLink="/recuperar-password" class="inline-block font-semibold text-xs text-habitalis-navy/60 hover:text-habitalis-gold transition-colors underline decoration-habitalis-navy/10 underline-offset-4">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </div>

      <div class="pt-2">
        <button
          type="submit"
          [disabled]="!loginForm.valid"
          class="w-full bg-habitalis-olive hover:bg-habitalis-olive/90 text-white font-bold py-3.5 px-4 rounded-lg shadow-sm transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed uppercase tracking-widest text-sm"
        >
          Iniciar Sesión
        </button>
      </div>

      <div class="mt-8 text-center border-t border-habitalis-navy/5 pt-6">
        <p class="text-habitalis-navy/60 text-sm font-medium">
          ¿Aún no tienes cuenta?
          <a routerLink="/register" class="text-habitalis-navy hover:text-habitalis-olive font-bold transition-colors ml-1">
            Crea una aquí
          </a>
        </p>
      </div>
    </form>
  </div>
</div>
