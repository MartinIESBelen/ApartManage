# ==============================================================================
# CONFIGURACI”N DE LA BASE DE DATOS (MySQL)
# ==============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/apartmanageDB?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
# En Spring Boot 3 el driver se autodetecta, pero dejarlo no hace daÒo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================================
# CONFIGURACI”N DE JPA / HIBERNATE
# ==============================================================================
# Hibernate 6 (Spring Boot 3) autodetecta el dialecto, pero es mejor dejarlo si quieres asegurar MySQL 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Muestra el SQL en consola
spring.jpa.show-sql=true
# MEJORA: Formatea el SQL para que sea legible y no una sola lÌnea infinita
spring.jpa.properties.hibernate.format_sql=true
# MEJORA: AÒade comentarios al SQL generado para saber quÈ operaciÛn lo disparÛ
spring.jpa.properties.hibernate.use_sql_comments=true

# GestiÛn del esquema (DDL)
spring.jpa.hibernate.ddl-auto= update
spring.jpa.generate-ddl=true

# ==============================================================================
# LOGGING
# ==============================================================================
# MEJORA: Permite ver los valores reales (? -> 'Inception') que se envÌan en las consultas
logging.level.org.hibernate.orm.results=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==============================================================================
# CONFIGURACI”N JACKSON (JSON)
# ==============================================================================
# Evita errores al intentar serializar objetos Proxy de Hibernate (Lazy loading)
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
# Formato de fechas global si no se usa @JsonFormat
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ==============================================================================
# ALMACENAMIENTO
# ==============================================================================

# Carpeta raÌz donde se guardar·n todos los archivos subidos
app.almacenamiento.raiz=C:/Users/sierr/Desktop/ApartManage/
# Aumentar el lÌmite de archivos (ejemplo a 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


